<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI by Naufal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9; 
            --container-bg: rgba(255, 255, 255, 0.7);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --user-bubble: #2563eb;
            --ai-bubble: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.08);
            --header-bg: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.9);
            --popup-bg: rgba(255, 255, 255, 0.9);
            --popup-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* DARK MODE VARIABLES */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-bubble: #3b82f6;
            --ai-bubble: rgba(51, 65, 85, 0.9);
            --border-color: rgba(255, 255, 255, 0.1);
            --header-bg: rgba(30, 41, 59, 0.8);
            --input-bg: rgba(15, 23, 42, 0.9);
            --popup-bg: rgba(30, 41, 59, 0.9);
            --popup-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; position: relative; transition: background-color 0.3s, color 0.3s; }
        
        .glow-bg { position: absolute; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 60%); z-index: 0; pointer-events: none; }
        
        /* LANDING PAGE */
        #landing-page { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; animation: fadeIn 0.8s ease-out; width: 100%; height: 100%; z-index: 1; padding: 20px; position: relative; }
        .brand-title { font-size: clamp(3rem, 8vw, 4.5rem); font-weight: 800; letter-spacing: -1.5px; margin-bottom: 8px; color: var(--text-main); }
        .brand-title span { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-muted); font-size: 1rem; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
        .start-btn { background: var(--header-bg); border: 1px solid var(--border-color); backdrop-filter: blur(10px); color: var(--text-main); padding: 14px 32px; font-size: 1rem; font-weight: 600; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.15); }

        /* SIDEBAR MULTI-CHAT */
        .sidebar { position: fixed; left: 0; top: 0; height: 100dvh; width: 280px; background-color: var(--input-bg); backdrop-filter: blur(20px); border-right: 1px solid var(--border-color); z-index: 100; transform: translateX(-100%); transition: transform 0.3s ease; display: flex; flex-direction: column; padding: 20px; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.3); z-index: 99; display: none; }
        .sidebar-overlay.show { display: block; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-sidebar-btn { background: transparent; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; }
        .new-chat-btn { background: var(--user-bubble); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-bottom: 15px; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .new-chat-btn:hover { opacity: 0.9; }
        .chat-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { padding: 12px; border-radius: 10px; background: rgba(128,128,128,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; border: 1px solid transparent; transition: 0.2s; color: var(--text-main); }
        .chat-item:hover, .chat-item.active { background: rgba(128,128,128,0.1); border-color: var(--border-color); }
        .chat-item.active { border-color: var(--user-bubble); font-weight: 500; }
        .chat-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-grow: 1; margin-right: 10px; text-align: left; }
        .delete-chat-btn { background: transparent; border: none; cursor: pointer; opacity: 0.5; transition: 0.2s; font-size: 0.95rem; }
        .delete-chat-btn:hover { opacity: 1; }

        /* CHAT CONTAINER */
        .chat-container { width: 100%; max-width: 800px; height: 100dvh; background-color: var(--container-bg); backdrop-filter: blur(20px); display: none; flex-direction: column; z-index: 1; border: 1px solid var(--border-color); transition: all 0.3s; }
        @media (min-width: 768px) { .chat-container { height: 90vh; border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2); } }

        .chat-header { position: relative; padding: 16px 20px; text-align: center; border-bottom: 1px solid var(--border-color); background: var(--header-bg); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; }
        .header-actions { display: flex; gap: 4px; align-items: center; }
        .icon-btn { background: transparent; border: none; color: var(--text-main); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn:hover { background-color: rgba(128,128,128,0.1); }
        .chat-header h2 { font-size: 1.1rem; font-weight: 700; flex-grow: 1; text-align: center; }
        
        .chat-history { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .chat-history::-webkit-scrollbar { width: 5px; } .chat-history::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 10px; }
        
        /* MESSAGES & MARKDOWN */
        .message { max-width: 85%; width: fit-content; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; animation: slideUp 0.3s ease-out; display: flex; flex-direction: column; position: relative; }
        .message.user { align-self: flex-end; background-color: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .message.ai { align-self: flex-start; background-color: var(--ai-bubble); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        .message img { max-width: 100%; max-height: 200px; border-radius: 10px; cursor: zoom-in; display: block; margin-top: 5px; }
        
        /* Markdown Styling inside AI bubble */
        .message.ai p { margin-bottom: 8px; }
        .message.ai p:last-child { margin-bottom: 0; }
        .message.ai pre { background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-family: monospace; font-size: 0.85rem; }
        .message.ai code { background: rgba(0,0,0,0.1); padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; }
        [data-theme="dark"] .message.ai pre, [data-theme="dark"] .message.ai code { background: rgba(255,255,255,0.1); }
        
        /* AI Action Buttons */
        .ai-actions { display: flex; gap: 5px; margin-top: 8px; align-self: flex-end; }
        .ai-actions button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; }
        .ai-actions button:hover { color: var(--text-main); background: rgba(128,128,128,0.1); }

        .image-preview-container { padding: 10px 20px; display: none; border-top: 1px solid var(--border-color); background-color: var(--header-bg); }
        .image-preview-box img { max-height: 60px; border-radius: 8px; border: 1px solid var(--border-color); }
        
        /* INPUT AREA */
        .input-area { padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid var(--border-color); background: var(--header-bg); backdrop-filter: blur(10px); padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        .input-area textarea { flex-grow: 1; padding: 12px 20px; border-radius: 20px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-main); outline: none; font-size: 0.95rem; transition: all 0.2s; resize: none; min-height: 44px; max-height: 120px; overflow-y: auto; }
        .input-area textarea:focus { border-color: #3b82f6; }
        
        .send-btn { background-color: #2563eb; color: #ffffff; width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); display: flex; justify-content: center; align-items: center; }
        
        /* MODAL */
        .modal { display: flex; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal.show { opacity: 1; visibility: visible; }
        .modal-content { max-width: 90%; max-height: 90%; border-radius: 12px; transition: transform 0.2s; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 35px; cursor: pointer; z-index: 1001; }

        /* CUSTOM POPUP ALERT */
        .custom-popup { display: none; position: fixed; z-index: 1001; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.9); background-color: var(--popup-bg); backdrop-filter: blur(10px); color: var(--text-main); padding: 20px 30px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--popup-shadow); opacity: 0; transition: all 0.3s ease; }
        .custom-popup.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .custom-popup-content { text-align: center; font-weight: 500; font-size: 1.1rem; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; background-color: var(--ai-bubble); border-radius: 16px; align-self: flex-start; }
        .dot { width: 6px; height: 6px; background-color: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(1){ animation-delay: 0.2s; } .dot:nth-child(2){ animation-delay: 0.4s; } .dot:nth-child(3){ animation-delay: 0.6s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <!-- SIDEBAR PANEL -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 style="font-weight: 700;">Riwayat Obrolan</h3>
            <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <button class="new-chat-btn" onclick="buatChatBaru()">+ Sesi Baru</button>
        <div class="chat-list" id="chat-list"></div>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="landing-page">
        <h1 class="brand-title">AIBIBEL BY<br><span>NAUFAL</span></h1>
        <p class="subtitle">Personal Assistant</p>
        <button class="start-btn" onclick="masukKeChat()">Mulai Percakapan</button>
    </div>

    <div class="chat-container" id="chat-section">
        <div class="chat-header">
            <div class="header-actions">
                <!-- Hamburger Menu Button -->
                <button class="icon-btn" onclick="toggleSidebar()" title="Menu Riwayat">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <button class="icon-btn" onclick="kembaliKeLanding()" title="Kembali">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <button class="icon-btn" onclick="hapusSemuaChat()" title="Kosongkan Obrolan Ini">🗑️</button>
            </div>
            <h2>AI by Naufal</h2>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()" title="Ganti Tema">🌓</button>
            </div>
        </div>
        
        <div class="chat-history" id="chat-history"></div>
        
        <div class="image-preview-container" id="preview-container">
            <div class="image-preview-box">
                <img id="preview-img" src="" alt="Preview">
                <button style="position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; border-radius:50%; cursor:pointer;" onclick="hapusGambar()">✕</button>
            </div>
        </div>

        <div class="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
            
            <!-- IKON PLUS PENGGANTI KAMERA -->
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Lampirkan Gambar">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            
            <textarea id="prompt" placeholder="Ketik pesan..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
            
            <button class="send-btn" id="btn-kirim" onclick="kirimPesan()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div id="image-modal" class="modal" onclick="tutupModal(event)">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="img-modal-view">
    </div>

    <div id="custom-alert" class="custom-popup">
        <div class="custom-popup-content" id="custom-alert-message"></div>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const promptInput = document.getElementById('prompt');
        let selectedImageData = null;
        let isTyping = false; 

        // MULTI CHAT SYSTEM DATA STATE
        let allChats = [];
        let currentChatId = null;

        // Inisialisasi Aplikasi
        window.onload = () => {
            muatSemuaChatDariStorage();
            if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        };

        // UI & Sidebar Navigation
        function masukKeChat() { document.getElementById('landing-page').style.display = 'none'; document.getElementById('chat-section').style.display = 'flex'; }
        function kembaliKeLanding() { document.getElementById('chat-section').style.display = 'none'; document.getElementById('landing-page').style.display = 'flex'; }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('show');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        function showCustomAlert(message) {
            const popup = document.getElementById('custom-alert');
            const messageElement = document.getElementById('custom-alert-message');
            messageElement.innerText = message;
            popup.classList.add('show');
            setTimeout(() => { popup.classList.remove('show'); }, 2500); 
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight < 120 ? el.scrollHeight : 120) + 'px';
        }
        
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                kirimPesan();
            }
        }

        // --- FITUR SPEECH, COPY & DOWNLOAD ---
        function bacaTeks(encodedText) {
            let teks = decodeURIComponent(encodedText).replace(/[*#`_]/g, ''); 
            const synth = window.speechSynthesis;
            synth.cancel(); 
            const utterThis = new SpeechSynthesisUtterance(teks);
            utterThis.lang = 'id-ID';
            function setVoiceAndSpeak() {
                const voices = synth.getVoices();
                const voiceID = voices.find(v => v.lang === 'id-ID' || v.name.includes('Indonesia'));
                if (voiceID) utterThis.voice = voiceID;
                synth.speak(utterThis);
            }
            if (synth.getVoices().length === 0) synth.onvoiceschanged = setVoiceAndSpeak;
            else setVoiceAndSpeak();
        }

        function salinTeks(encodedText) {
            const teks = decodeURIComponent(encodedText);
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(teks).then(() => showCustomAlert("Teks berhasil disalin!")).catch(() => fallbackCopyText(teks));
            } else fallbackCopyText(teks);
        }
        
        function fallbackCopyText(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text; document.body.appendChild(textArea); textArea.select();
            try { document.execCommand('copy'); showCustomAlert("Teks berhasil disalin!"); } catch (err) {}
            document.body.removeChild(textArea);
        }

        async function downloadGambar(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'AIBibel-Image-' + new Date().getTime() + '.jpg';
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                showCustomAlert("Berhasil simpan gambar!");
            } catch (err) { console.error(err); }
        }

        // --- CORE MULTI-CHAT STORAGE SYSTEM ---
        function muatSemuaChatDariStorage() {
            const storedChats = localStorage.getItem('aibibel_multi_chats');
            if (storedChats) {
                allChats = JSON.parse(storedChats);
            }
            
            if (allChats.length === 0) {
                const newId = Date.now();
                allChats.push({
                    id: newId,
                    title: "Obrolan Baru",
                    html: `<div class="message ai"><p>Halo! Ada yang bisa aku bantu?</p></div>`
                });
                currentChatId = newId;
            } else {
                const lastId = localStorage.getItem('aibibel_current_chat_id');
                if (lastId && allChats.some(c => c.id == lastId)) {
                    currentChatId = parseInt(lastId);
                } else {
                    currentChatId = allChats[0].id;
                }
            }
            
            simpanSemuaStatekeStorage();
            renderDaftarSidebar();
            tampilkanIsiChatAktif();
        }

        function simpanChatKeStorage() {
            const activeChat = allChats.find(c => c.id === currentChatId);
            if (activeChat) {
                activeChat.html = chatHistory.innerHTML;
                
                // Set judul otomatis berdasarkan pesan pertama user
                if (activeChat.title === "Obrolan Baru" || activeChat.title === "Chat Baru") {
                    const firstUserMsg = chatHistory.querySelector('.message.user span');
                    if (firstUserMsg) {
                        let text = firstUserMsg.innerText || firstUserMsg.textContent;
                        activeChat.title = text.length > 20 ? text.substring(0, 20) + "..." : text;
                        renderDaftarSidebar();
                    }
                }
            }
            simpanSemuaStatekeStorage();
        }

        function simpanSemuaStatekeStorage() {
            localStorage.setItem('aibibel_multi_chats', JSON.stringify(allChats));
            localStorage.setItem('aibibel_current_chat_id', currentChatId);
        }

        function renderDaftarSidebar() {
            const listContainer = document.getElementById('chat-list');
            listContainer.innerHTML = '';
            
            allChats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.setAttribute('onclick', `gantiSesiChat(${chat.id})`);
                
                const titleSpan = document.createElement('span');
                titleSpan.innerText = chat.title;
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-chat-btn';
                deleteBtn.innerHTML = '🗑️';
                deleteBtn.setAttribute('onclick', `hapusSesiChat(event, ${chat.id})`);
                
                item.appendChild(titleSpan);
                item.appendChild(deleteBtn);
                listContainer.appendChild(item);
            });
        }

        function tampilkanIsiChatAktif() {
            const activeChat = allChats.find(c => c.id === currentChatId);
            if (activeChat) {
                chatHistory.innerHTML = activeChat.html;
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }
        }

        function gantiSesiChat(id) {
            currentChatId = id;
            localStorage.setItem('aibibel_current_chat_id', currentChatId);
            tampilkanIsiChatAktif();
            renderDaftarSidebar();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function buatChatBaru() {
            const newId = Date.now();
            allChats.unshift({
                id: newId,
                title: "Chat Baru",
                html: `<div class="message ai"><p>Halo! Ada yang bisa aku bantu?</p></div>`
            });
            currentChatId = newId;
            simpanSemuaStatekeStorage();
            renderDaftarSidebar();
            tampilkanIsiChatAktif();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function hapusSesiChat(e, id) {
            e.stopPropagation(); 
            if (allChats.length === 1) {
                showCustomAlert("Minimal harus menyisakan 1 obrolan!");
                return;
            }
            if (confirm("Hapus sesi obrolan ini?")) {
                allChats = allChats.filter(c => c.id !== id);
                if (currentChatId === id) {
                    currentChatId = allChats[0].id;
                }
                simpanSemuaStatekeStorage();
                renderDaftarSidebar();
                tampilkanIsiChatAktif();
            }
        }

        function hapusSemuaChat() {
            if(confirm("Kosongkan semua pesan di obrolan aktif ini?")) {
                chatHistory.innerHTML = '';
                tambahPesan("Halo! Ada yang bisa aku bantu?", 'ai', null, true);
                simpanChatKeStorage();
            }
        }

        // Image Handling
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageData = { mimeType: file.type, base64Data: e.target.result.split(',')[1], dataUrl: e.target.result };
                document.getElementById('preview-img').src = selectedImageData.dataUrl;
                document.getElementById('preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        function hapusGambar() { selectedImageData = null; document.getElementById('file-input').value = ''; document.getElementById('preview-container').style.display = 'none'; }
        
        function bukaModal(src) { document.getElementById('img-modal-view').src = src; document.getElementById('image-modal').classList.add('show'); }
        function tutupModal(e) { if(e.target.id === 'image-modal' || e.target.classList.contains('close-modal')) document.getElementById('image-modal').classList.remove('show'); }

        // --- MESSAGES SYSTEM ---
        function tambahPesan(teks, pengirim, imgUrl = null, isInit = false) {
            const div = document.createElement('div');
            div.className = `message ${pengirim}`;
            let htmlContent = '';
            
            if (teks && pengirim === 'ai') {
                const encodedText = encodeURIComponent(teks); 
                htmlContent += marked.parse(teks);
                htmlContent += `
                    <div class="ai-actions">
                        <button onclick="salinTeks('${encodedText}')" title="Salin">📋</button>
                        <button onclick="bacaTeks('${encodedText}')" title="Baca">🔊</button>
                    </div>`;
            } else if (teks) {
                htmlContent += `<span>${teks.replace(/\n/g, '<br>')}</span>`;
            }

            if (imgUrl && pengirim === 'user') {
                htmlContent += `<img src="${imgUrl}" onclick="bukaModal(this.src)">`;
            } else if (imgUrl && pengirim === 'ai') {
                htmlContent += `
                    <div style="margin-top:10px; display:flex; flex-direction:column; gap:8px;">
                        <img src="${imgUrl}" onclick="bukaModal(this.src)" style="cursor:zoom-in;">
                        <button onclick="downloadGambar('${imgUrl}')" style="background-color: var(--user-bubble); color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: 0.2s;">
                            📥 Simpan Gambar
                        </button>
                    </div>`;
            }
            
            div.innerHTML = htmlContent;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            
            if(!isInit) simpanChatKeStorage();
            return div;
        }

        function ketikPesanAI(teks, imgUrl = null) {
            isTyping = true;
            const div = document.createElement('div');
            div.className = `message ai`;
            chatHistory.appendChild(div);
            
            let i = 0;
            const kecepatan = 3; 
            
            const ngetikInterval = setInterval(() => {
                i += kecepatan;
                if (i >= teks.length) {
                    i = teks.length;
                    clearInterval(ngetikInterval);
                    renderPesanSelesai(div, teks, imgUrl);
                } else {
                    div.innerHTML = marked.parse(teks.substring(0, i));
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }
            }, 15); 
        }

        function renderPesanSelesai(div, teks, imgUrl) {
            const encodedText = encodeURIComponent(teks);
            let htmlContent = marked.parse(teks);
            
            htmlContent += `
                <div class="ai-actions">
                    <button onclick="salinTeks('${encodedText}')" title="Salin">📋</button>
                    <button onclick="bacaTeks('${encodedText}')" title="Baca">🔊</button>
                </div>`;

            if (imgUrl) {
                htmlContent += `
                    <div style="margin-top:10px; display:flex; flex-direction:column; gap:8px;">
                        <img src="${imgUrl}" onclick="bukaModal(this.src)" style="cursor:zoom-in;">
                        <button onclick="downloadGambar('${imgUrl}')" style="background-color: var(--user-bubble); color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: 0.2s;">
                            📥 Simpan Gambar
                        </button>
                    </div>`;
            }

            div.innerHTML = htmlContent;
            chatHistory.scrollTop = chatHistory.scrollHeight;
            simpanChatKeStorage();
            isTyping = false; 
        }

        function tampilkanLoading() {
            const div = document.createElement('div'); div.className = 'typing-indicator'; div.id = 'loading';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatHistory.appendChild(div); chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function kirimPesan() {
            if (isTyping) return showCustomAlert("Tunggu AI selesai mengetik ya!"); 

            const teks = promptInput.value.trim();
            if (!teks && !selectedImageData) return;

            tambahPesan(teks, 'user', selectedImageData ? selectedImageData.dataUrl : null);
            
            const payload = { prompt: teks };
            if (selectedImageData) payload.image = { mimeType: selectedImageData.mimeType, base64Data: selectedImageData.base64Data };

            promptInput.value = '';
            promptInput.style.height = 'auto'; 
            hapusGambar();
            tampilkanLoading();

            try {
                const response = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                document.getElementById('loading')?.remove();

                if (data.error) {
                    tambahPesan("Error: " + data.error, 'ai');
                } else {
                    ketikPesanAI(data.reply, data.imageUrl);
                }
            } catch (error) {
                document.getElementById('loading')?.remove();
                tambahPesan("Gagal menghubungi server. Pastikan koneksi internet stabil.", 'ai');
            }
        }
    </script>
</body>
