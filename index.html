<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI by Naufal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9; 
            --container-bg: rgba(255, 255, 255, 0.7);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --user-bubble: #2563eb;
            --ai-bubble: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.08);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; 
            overflow: hidden; 
            position: relative; 
        }
        
        .glow-bg { 
            position: absolute; 
            width: 100vw; 
            height: 100vh; 
            background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, rgba(241, 245, 249, 1) 60%); 
            z-index: 0; 
            pointer-events: none; 
        }
        
        /* LANDING PAGE */
        #landing-page { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            animation: fadeIn 0.8s ease-out; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            padding: 20px;
            position: relative;
        }
        .brand-title { 
            font-size: clamp(3rem, 8vw, 4.5rem); 
            font-weight: 800; 
            letter-spacing: -1.5px; 
            margin-bottom: 8px; 
            color: #1e293b;
        }
        .brand-title span { 
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .subtitle { 
            color: var(--text-muted); 
            font-size: 1rem; 
            font-weight: 500; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin-bottom: 40px; 
        }
        .start-btn { 
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid var(--border-color); 
            backdrop-filter: blur(10px); 
            color: #1e293b; 
            padding: 14px 32px; 
            font-size: 1rem; 
            font-weight: 600; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .start-btn:hover { 
            background: rgba(255, 255, 255, 1); 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.15); 
        }

        .portfolio-link {
            position: absolute;
            bottom: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s, transform 0.3s;
        }
        .portfolio-link:hover {
            color: #2563eb;
            transform: translateY(-2px);
        }
        
        /* CHAT CONTAINER */
        .chat-container { 
            width: 100%; 
            max-width: 800px; 
            height: 100dvh; 
            background-color: var(--container-bg); 
            backdrop-filter: blur(20px); 
            display: none; 
            flex-direction: column; 
            z-index: 1;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        @media (min-width: 768px) {
            .chat-container {
                height: 90vh;
                border-radius: 24px;
                border: 1px solid var(--border-color);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            }
        }

        .chat-header { 
            position: relative; 
            padding: 16px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--border-color); 
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn {
            position: absolute;
            left: 16px;
            background: transparent;
            border: none;
            color: #1e293b;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .back-btn:hover {
            background-color: rgba(0,0,0,0.05);
        }

        .chat-header h2 { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: #1e293b;
            letter-spacing: -0.5px;
        }
        
        .chat-history { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            scroll-behavior: smooth; 
        }
        .chat-history::-webkit-scrollbar { width: 5px; }
        .chat-history::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 10px; }
        
        .message { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 16px; 
            line-height: 1.5; 
            font-size: 0.95rem; 
            word-wrap: break-word; 
            animation: slideUp 0.3s ease-out; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .message.user { 
            align-self: flex-end; 
            background-color: var(--user-bubble); 
            color: white; 
            border-bottom-right-radius: 4px; 
        }
        .message.ai { 
            align-self: flex-start; 
            background-color: var(--ai-bubble); 
            color: var(--text-main); 
            border-bottom-left-radius: 4px; 
            border: 1px solid var(--border-color); 
        }
        .message img { 
            max-width: 100%; 
            border-radius: 10px; 
            margin-bottom: 8px; 
            cursor: zoom-in; 
            transition: transform 0.2s;
        }
        .message img:hover {
            transform: scale(1.02); 
        }

        /* --- PERBAIKAN STYLING KHUSUS PESAN GAMBAR --- */
        .message.img-only {
            background-color: transparent !important; 
            padding: 0 !important; 
            box-shadow: none !important;
            border: none !important;
        }
        .message.img-only img {
            border-radius: 16px;
            margin-bottom: 0;
            border: 1px solid rgba(0,0,0,0.1); 
        }
        
        .message.with-img {
            padding: 6px; /* Bikin padding lebih tipis memeluk gambar */
        }
        .message.with-img img {
            border-radius: 12px;
            margin-bottom: 4px;
            display: block;
        }
        .message.with-img span {
            display: inline-block;
            padding: 2px 8px 6px 8px;
        }
        /* --------------------------------------------- */
        
        .image-preview-container { 
            padding: 10px 20px; 
            display: none; 
            border-top: 1px solid var(--border-color); 
            background-color: rgba(255, 255, 255, 0.5); 
        }
        .image-preview-box { 
            position: relative; 
            display: inline-block; 
        }
        .image-preview-box img { 
            max-height: 60px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
        }
        .remove-img-btn { 
            position: absolute; 
            top: -6px; 
            right: -6px; 
            background-color: #ef4444; 
            color: white; 
            border: none; 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .input-area { 
            padding: 12px 16px; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            border-top: 1px solid var(--border-color); 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
        }
        .input-area input[type="text"] { 
            flex-grow: 1; 
            padding: 12px 20px; 
            border-radius: 24px; 
            border: 1px solid rgba(0, 0, 0, 0.1); 
            background-color: rgba(255, 255, 255, 0.9); 
            color: var(--text-main); 
            outline: none; 
            font-size: 0.95rem;
            transition: all 0.3s; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .input-area input[type="text"]::placeholder { color: #94a3b8; }
        .input-area input[type="text"]:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        
        .icon-btn, .send-btn { 
            flex-shrink: 0; 
            border: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border-radius: 50%; 
            transition: 0.2s;
        }
        .icon-btn { background: transparent; color: var(--text-muted); width: 40px; height: 40px; }
        .icon-btn:hover { background-color: rgba(0,0,0,0.05); color: #1e293b; }
        
        .send-btn { 
            background-color: #2563eb; color: #ffffff; width: 44px; height: 44px; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }
        .send-btn:active { transform: scale(0.9); }
        .send-btn svg { width: 18px; height: 18px; transform: translateX(1px) translateY(-1px); }

        .typing-indicator { 
            display: flex; gap: 4px; padding: 12px 16px; background-color: var(--ai-bubble); 
            border-radius: 16px; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); align-self: flex-start; 
        }
        .dot { width: 6px; height: 6px; background-color: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(1) { animation-delay: 0.2s; } .dot:nth-child(2) { animation-delay: 0.4s; } .dot:nth-child(3) { animation-delay: 0.6s; }

        .modal {
            display: flex; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(8px);
            justify-content: center; 
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .modal.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            max-width: 90%; 
            max-height: 90%; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: grab;
            touch-action: none;
            transform-origin: center center;
        }
        .modal-content:active {
            cursor: grabbing; 
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            z-index: 1001;
        }
        .close-modal:hover { color: #ef4444; }

        @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div id="landing-page">
        <h1 class="brand-title">ai by<br><span>naufal</span></h1>
        <p class="subtitle">Personal Assistant</p>
        <button class="start-btn" onclick="masukKeChat()">Mulai Percakapan</button>
        
        <a href="LINK_WEB_PORTOFOLIO_KAMU_DISINI" target="_blank" class="portfolio-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            Kunjungi Portofolioku
        </a>
    </div>

    <div class="chat-container" id="chat-section">
        <div class="chat-header">
            <button class="back-btn" onclick="kembaliKeLanding()" title="Kembali ke Beranda">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            
            <h2>AI by Naufal</h2>
        </div>
        
        <div class="chat-history" id="chat-history">
            <div class="message ai">Halo! Kirimkan gambar atau teks, dan aku akan membantumu.</div>
        </div>
        
        <div class="image-preview-container" id="preview-container">
            <div class="image-preview-box">
                <img id="preview-img" src="" alt="Preview">
                <button class="remove-img-btn" onclick="hapusGambar()">✕</button>
            </div>
        </div>

        <div class="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
            
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Unggah Gambar">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
            </button>

            <input type="text" id="prompt" placeholder="Ketik pesan..." onkeypress="handleEnter(event)">
            
            <button class="send-btn" onclick="kirimPesan()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <div id="image-modal" class="modal" onclick="tutupModal(event)">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="img-modal-view">
    </div>

    <script>
        function masukKeChat() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('chat-section').style.display = 'flex';
        }

        function kembaliKeLanding() {
            document.getElementById('chat-section').style.display = 'none';
            document.getElementById('landing-page').style.display = 'flex';
        }

        const chatHistory = document.getElementById('chat-history');
        const promptInput = document.getElementById('prompt');
        let selectedImageData = null;

        function handleEnter(event) {
            if (event.key === 'Enter') kirimPesan();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                const base64Data = dataUrl.split(',')[1];
                
                selectedImageData = {
                    mimeType: file.type,
                    base64Data: base64Data,
                    dataUrl: dataUrl
                };

                document.getElementById('preview-img').src = dataUrl;
                document.getElementById('preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function hapusGambar() {
            selectedImageData = null;
            document.getElementById('file-input').value = '';
            document.getElementById('preview-container').style.display = 'none';
        }

        function tambahPesan(teks, pengirim, imgUrl = null) {
            const div = document.createElement('div');
            div.className = `message ${pengirim}`;
            
            // --- DETEKSI JIKA PESAN BERISI GAMBAR BIAR BACKGROUND MENYESUAIKAN ---
            if (imgUrl && !teks) {
                div.classList.add('img-only'); // Hanya gambar -> Hapus background biru
            } else if (imgUrl && teks) {
                div.classList.add('with-img'); // Gambar + teks -> Background nempel rapi
            }
            
            if (imgUrl) {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.onclick = function() {
                    bukaModal(this.src);
                };
                div.appendChild(img);
            }
            
            if (teks) {
                const span = document.createElement('span');
                span.innerHTML = teks.replace(/\n/g, '<br>');
                div.appendChild(span);
            }

            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function tampilkanLoading() {
            const div = document.createElement('div');
            div.className = 'typing-indicator'; div.id = 'loading';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function hapusLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        const modal = document.getElementById('image-modal');
        const modalImg = document.getElementById('img-modal-view');
        
        let scale = 1, panning = false, pointX = 0, pointY = 0, startX = 0, startY = 0;
        let startDistance = 0, startScale = 1;

        function setTransform() {
            modalImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }

        function bukaModal(src) {
            modalImg.src = src;
            scale = 1; pointX = 0; pointY = 0;
            setTransform();
            modal.classList.add('show');
        }

        function tutupModal(e) {
            if (e.target === modal || e.target.classList.contains('close-modal')) {
                modal.classList.remove('show');
            }
        }

        modalImg.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            panning = true;
            startX = e.clientX - pointX;
            startY = e.clientY - pointY;
        });

        window.addEventListener('pointermove', (e) => {
            if (!panning) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            setTransform();
        });

        window.addEventListener('pointerup', () => {
            panning = false;
        });

        modalImg.addEventListener('wheel', (e) => {
            e.preventDefault();
            let delta = Math.sign(e.deltaY) * -0.1;
            scale += delta;
            scale = Math.max(0.1, Math.min(scale, 10)); 
            setTransform();
        });

        modalImg.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                startDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                startScale = scale;
            }
        });

        modalImg.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                let currentDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                scale = startScale * (currentDistance / startDistance);
                scale = Math.max(0.1, Math.min(scale, 10)); 
                setTransform();
            }
        });

        async function kirimPesan() {
            const teks = promptInput.value.trim();
            if (!teks && !selectedImageData) return;

            tambahPesan(teks, 'user', selectedImageData ? selectedImageData.dataUrl : null);
            
            const payload = { prompt: teks };
            if (selectedImageData) {
                payload.image = {
                    mimeType: selectedImageData.mimeType,
                    base64Data: selectedImageData.base64Data
                };
            }

            promptInput.value = '';
            hapusGambar();
            tampilkanLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                hapusLoading();

                if (data.error) {
                    tambahPesan("Error: " + data.error, 'ai');
                } else {
                    tambahPesan(data.reply, 'ai');
                }
            } catch (error) {
                hapusLoading();
                tambahPesan("Gagal menghubungi server. Pastikan API Vercel berjalan.", 'ai');
            }
        }
    </script>
</body>
</html>
